<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event & Festival Finder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <div class="logo">
                <span class="logo-icon">🎉</span>
                <span class="logo-text">EventFinder</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#explore" class="nav-link">Explore</a></li>
                <li><a href="#map" class="nav-link">Map</a></li>
                <li><a href="#schedule" class="nav-link">Schedule</a></li>
                <li><a href="#favorites" class="nav-link">Favorites</a></li>
            </ul>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">Discover Events</h1>
            <p class="hero-subtitle">Find concerts, festivals, sports near you</p>
            <div class="hero-search">
                <input type="text" id="heroSearchInput" placeholder="Search events..." class="search-input">
                <input type="text" id="heroCityInput" placeholder="City" class="city-input">
                <button class="search-btn" id="heroSearchBtn">Search</button>
            </div>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalEvents">0</span>
                    <span class="stat-label">Events</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="favoritesCount">0</span>
                    <span class="stat-label">Favorites</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="scheduledCount">0</span>
                    <span class="stat-label">Scheduled</span>
                </div>
            </div>
        </div>
    </section>

    <section id="explore" class="explore-section">
        <div class="container">
            <h2 class="section-title">Explore Events</h2>
            <div class="explore-controls">
                <div class="search-bar">
                    <input type="text" id="exploreSearch" placeholder="Search events..." class="search-input">
                    <input type="text" id="exploreCity" placeholder="City" class="city-input">
                </div>
                <div class="filters">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="KZFzniwnSyZfZ7v7nJ">Music</option>
                        <option value="KZFzniwnSyZfZ7v7nE">Sports</option>
                        <option value="KZFzniwnSyZfZ7v7na">Arts & Theatre</option>
                        <option value="KZFzniwnSyZfZ7v7n1">Family</option>
                        <option value="KZFzniwnSyZfZ7v7nn">Comedy</option>
                    </select>
                    <button class="btn btn-primary" id="searchBtn">Search</button>
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                </div>
            </div>
            <div class="events-grid" id="eventsGrid">
                <div class="loading-spinner"></div>
            </div>
            <button class="btn btn-secondary" id="loadMoreBtn" style="display:none;margin:2rem auto;padding:1rem 3rem;">
                Load More
            </button>
        </div>
    </section>

    <section id="map" class="map-section">
        <div class="container">
            <h2 class="section-title">Events Map</h2>
            <p id="mapStatus" style="text-align:center;color:var(--text-secondary);margin-bottom:1rem;"></p>
            <div id="eventsMap"></div>
        </div>
    </section>

    <section id="schedule" class="schedule-section">
        <div class="container">
            <h2 class="section-title">Schedule</h2>
            <div class="schedule-grid" id="scheduleGrid">
                <div class="empty-state">
                    <span class="empty-icon">📅</span>
                    <p>No events scheduled</p>
                </div>
            </div>
        </div>
    </section>

    <section id="favorites" class="favorites-section">
        <div class="container">
            <h2 class="section-title">Favorites</h2>
            <div class="favorites-grid" id="favoritesGrid">
                <div class="empty-state">
                    <span class="empty-icon">❤️</span>
                    <p>No favorites yet</p>
                </div>
            </div>
        </div>
    </section>

    <div class="modal" id="eventModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-body" id="modalBody">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 EventFinder</p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/countdown.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
